name: Build AUR Packages

on:
  workflow_dispatch:
  push:
    paths:
      - 'packages.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/archlinux/archlinux:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: pacman -Sy --noconfirm git base-devel go python-yaml

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build packages
        run: |
          mkdir -p /tmp/pkgout
          python3 build-packages.py

      - name: Create package database
        run: |
          mkdir -p $GITHUB_WORKSPACE/packages/x86_64
          cp /tmp/pkgout/*.pkg.tar.zst $GITHUB_WORKSPACE/packages/x86_64/
          cd $GITHUB_WORKSPACE/packages/x86_64
          repo-add solara-pkgs.db.tar.gz *.pkg.tar.zst
          ln -sf solara-pkgs.db.tar.gz solara-pkgs.db
          ln -sf solara-pkgs.files.tar.gz solara-pkgs.files

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solara-packages
          path: packages/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: solara-packages
          path: packages

      - name: Generate pkglist.json
        run: |
          cd packages/x86_64
          ls *.pkg.tar.zst | python3 -c "import sys,os,json; pkgs=[{'name':f.strip(),'size':os.path.getsize(f.strip())} for f in sys.stdin]; print(json.dumps(pkgs))" > ../../pkglist.json
          cat ../../pkglist.json

      - name: Delete old release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter packages
        run: |
          # Only include Solara packages (exclude upstream like linux-cachyos)
          mkdir -p release-pkgs
          for pkg in packages/x86_64/*.pkg.tar.zst; do
            basename "$pkg" | grep -vq "^linux-cachyos" && cp "$pkg" release-pkgs/
          done
          cp packages/x86_64/*.db.tar.gz release-pkgs/
          cp packages/x86_64/*.files.tar.gz release-pkgs/
          ls -la release-pkgs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: release-pkgs/*.pkg.tar.zst release-pkgs/*.db.tar.gz release-pkgs/*.files.tar.gz
          name: Latest Packages
          body: |
            Auto-built AUR packages for Solara Linux.

            Add to `/etc/pacman.conf`:
            ```
            [solara-pkgs]
            SigLevel = Optional TrustAll
            Server = https://ravecorelabs.github.io/solara-pkgs/x86_64
            ```
          draft: false
          prerelease: false

  pages:
    needs: release
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        run: |
          mkdir -p site/x86_64
          gh release download latest --dir site/x86_64 --pattern "*.pkg.tar.zst" || true
          gh release download latest --dir site/x86_64 --pattern "*.db.tar.gz" || true
          gh release download latest --dir site/x86_64 --pattern "*.files.tar.gz" || true
          cd site/x86_64
          ln -sf solara-pkgs.db.tar.gz solara-pkgs.db || true
          ln -sf solara-pkgs.files.tar.gz solara-pkgs.files || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pkglist.json
        run: |
          cp docs-src/index.html site/index.html
          cd site/x86_64
          ls *.pkg.tar.zst 2>/dev/null | python3 -c "import sys,os,json; pkgs=[{'name':f.strip(),'size':os.path.getsize(f.strip())} for f in sys.stdin if f.strip()]; print(json.dumps(pkgs))" > ../pkglist.json
          cat ../pkglist.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
